name: Checkov Validation
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main    
jobs:
  checkov: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov
        run: checkov -d . --quiet   