apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa
  namespace: dev
spec:
  replicas: 1

  selector:
    matchLabels:
      app: dvwa

  template:
    metadata:
      labels:
        app: dvwa

    spec:
      containers:
      - name: dvwa
        image: vulnerables/web-dvwa:latest

        ports:
        - containerPort: 80